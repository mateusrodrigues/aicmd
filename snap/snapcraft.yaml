name: aicmd
base: core24
adopt-info: aicmd
title: aicmd
license: GPL-3.0
source-code: https://github.com/mateusrodrigues/aicmd
issues: https://github.com/mateusrodrigues/aicmd/issues
summary: Describe a task in plain English, get a ready-to-run bash command
description: |
  aicmd translates natural-language task descriptions into bash one-liners
  using an AI model of your choice.

  Press the configured key binding (default: Ctrl+G) at your shell prompt,
  describe what you want to do, and the generated command lands directly in
  your readline buffer — ready to review, edit, and run with Enter.

  Supports any OpenAI-compatible endpoint (OpenAI, Azure OpenAI, Ollama,
  GitHub Models, etc.).

  **Getting Started**

  1. Install the snap: `sudo snap install aicmd`
  2. Configure your endpoint, API key, and model:
    `snap set aicmd endpoint=<your_endpoint> api-key=<your_api_key> model=<your_model>`

  **Shell Integration**

  Shell integration scripts for bash and zsh are included under
  /snap/aicmd/current/Shell/. Source the one matching your shell to enable
  the key binding (Ctrl+G):

     # bash — add to ~/.bashrc
     source /snap/aicmd/current/Shell/aicmd.bash

     # zsh — add to ~/.zshrc
     source /snap/aicmd/current/Shell/aicmd.zsh

grade: stable
confinement: strict

parts:
  aicmd:
    plugin: nil
    source: .
    build-packages:
      - dotnet-sdk-10.0
      - git
    stage-packages:
      - jq
      - libicu74
    override-build: |
      dotnet tool install --global minver-cli
      if [ "$CRAFT_ARCH_BUILD_FOR" = "amd64" ]; then
        rid=linux-x64
      elif [ "$CRAFT_ARCH_BUILD_FOR" = "arm64" ]; then
        rid=linux-arm64
      elif [ "$CRAFT_ARCH_BUILD_FOR" = "ppc64el" ]; then
        rid=linux-ppc64le
      elif [ "$CRAFT_ARCH_BUILD_FOR" = "s390x" ]; then
        rid=linux-s390x
      else
        echo "Unsupported architecture: $CRAFT_ARCH_BUILD_FOR"
        exit 1
      fi

      dotnet publish src/Aicmd.Console/Aicmd.Console.csproj \
        --configuration Release \
        --runtime $rid \
        --self-contained true \
        --output "$SNAPCRAFT_PART_INSTALL"

      # Set the snap version to the output of minver, which calculates the version based on git tags
      version=$(${HOME}/.dotnet/tools/minver src/Aicmd.Console --tag-prefix v --verbosity error)
      craftctl set version=$version


apps:
  aicmd:
    command: Aicmd.Console
    plugs:
      - network
